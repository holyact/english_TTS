<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>English Repeat Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto Sans+KR:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --accent: #4f8ef7; --accent-glow: rgba(79,142,247,0.15);
    --accent2: #a78bfa; --text: #e8eaf0; --text-muted: #7a7f9a;
    --green: #34d399; --yellow: #fbbf24; --radius: 14px;
  }
  body {
    font-family: 'Inter','Noto Sans KR',sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 28px 16px 80px;
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-size: 1.55rem; font-weight: 600;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; line-height: 1.5; }

  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.06); padding: 20px;
    width: 100%; max-width: 700px; margin-bottom: 12px;
  }

  /* ── STEP 1 헤더 (항상 보임) ── */
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .card-label {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
  }
  .toggle-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.78rem; color: var(--accent); font-weight: 600;
    background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.25);
    border-radius: 7px; padding: 5px 10px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans KR',sans-serif;
    transition: background 0.15s; white-space: nowrap;
  }
  .toggle-btn:active { background: rgba(79,142,247,0.2); }
  .toggle-arrow { font-size: 0.7rem; transition: transform 0.25s; display: inline-block; }
  .toggle-arrow.open { transform: rotate(180deg); }

  /* 접히는 영역 */
  .collapsible {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease;
    opacity: 0;
    margin-top: 0;
  }
  .collapsible.expanded {
    max-height: 600px;
    opacity: 1;
    margin-top: 14px;
  }

  /* 분리 완료 요약줄 */
  #input-summary {
    display: none;
    margin-top: 10px;
    font-size: 0.82rem; color: var(--text-muted);
    font-family: 'Noto Sans KR',sans-serif;
  }
  #input-summary span { color: var(--accent); font-weight: 600; }

  #text-area {
    width: 100%; min-height: 130px;
    background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px; color: var(--text); font-size: 1rem;
    line-height: 1.8; padding: 13px 15px; resize: vertical;
    font-family: 'Inter',sans-serif; transition: border-color 0.2s;
  }
  #text-area:focus { outline: none; border-color: var(--accent); }
  #text-area::placeholder { color: var(--text-muted); font-size: 0.92rem; }
  .parse-btn {
    margin-top: 10px; padding: 10px 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 9px; color: #fff;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans KR',sans-serif; -webkit-tap-highlight-color: transparent;
  }
  .parse-btn:active { opacity: 0.82; }
  .hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }

  /* ── STEP 2 ── */
  .select-toolbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .toolbar-btn {
    padding: 6px 14px; border-radius: 7px; border: none;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans KR',sans-serif; -webkit-tap-highlight-color: transparent;
  }
  .toolbar-btn.select-all   { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
  .toolbar-btn.deselect-all { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
  .toolbar-btn:active { opacity: 0.75; }
  .selected-count { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }
  .selected-count span { color: var(--accent); font-weight: 600; }

  #sentence-list { display: flex; flex-direction: column; gap: 6px; }
  .sentence-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border-radius: 10px;
    background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.06);
    cursor: pointer; transition: border-color 0.18s, background 0.18s;
    -webkit-tap-highlight-color: transparent; word-break: break-word;
  }
  .sentence-item:hover { border-color: rgba(79,142,247,0.35); background: rgba(79,142,247,0.05); }
  .sentence-item.checked { border-color: var(--accent); background: var(--accent-glow); }
  .sentence-item.playing  { border-color: var(--yellow); background: rgba(251,191,36,0.12); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.3); }
    50%      { box-shadow: 0 0 0 5px rgba(251,191,36,0); }
  }
  .custom-cb {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; margin-top: 2px;
    border: 2px solid rgba(255,255,255,0.2); background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; pointer-events: none;
  }
  .sentence-item.checked .custom-cb { background: var(--accent); border-color: var(--accent); }
  .custom-cb::after {
    content: ''; display: none; width: 5px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .sentence-item.checked .custom-cb::after { display: block; }
  .sentence-num { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); min-width: 18px; padding-top: 1px; flex-shrink: 0; }
  .sentence-item.checked .sentence-num { color: var(--accent); }
  .sentence-item.playing  .sentence-num { color: var(--yellow); }
  .sentence-txt { font-size: 0.97rem; line-height: 1.75; flex: 1; }

  /* ── STEP 3 ── */
  #selected-box {
    background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 13px 15px; min-height: 52px;
    font-size: 0.93rem; line-height: 1.75; word-break: break-word;
    color: var(--text-muted); font-style: italic;
    transition: border-color 0.25s, background 0.25s; margin-bottom: 16px;
    max-height: 140px; overflow-y: auto;
  }
  #selected-box.has-text { border-color: var(--accent); background: var(--accent-glow); color: var(--text); font-style: normal; }
  .preview-item { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .preview-item:last-child { border-bottom: none; }
  .preview-num { font-size: 0.72rem; color: var(--accent); font-weight: 700; margin-right: 6px; }

  .controls-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .ctrl-group {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface2); border-radius: 10px;
    padding: 8px 13px; border: 1px solid rgba(255,255,255,0.07);
  }
  .ctrl-label { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
  .round-btn {
    background: rgba(255,255,255,0.08); border: none; color: var(--text);
    width: 32px; height: 32px; border-radius: 7px; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .round-btn:active { background: rgba(255,255,255,0.18); }
  #repeat-count { font-size: 1.05rem; font-weight: 600; min-width: 24px; text-align: center; }
  #speed-range {
    -webkit-appearance: none; width: 82px; height: 4px;
    background: rgba(255,255,255,0.12); border-radius: 2px; cursor: pointer;
  }
  #speed-range::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  #speed-val { font-size: 0.8rem; color: var(--accent); font-weight: 600; min-width: 30px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 13px 0; border-radius: 10px; border: none;
    font-size: 0.93rem; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans KR',sans-serif;
    -webkit-tap-highlight-color: transparent; text-align: center; flex: 1;
  }
  .btn:not(:disabled):active { opacity: 0.82; transform: scale(0.97); }
  .btn-play { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px rgba(79,142,247,0.28); }
  .btn-play:disabled { opacity: 0.32; cursor: not-allowed; box-shadow: none; }
  .btn-all  { background: rgba(52,211,153,0.14); color: var(--green); border: 1px solid rgba(52,211,153,0.28); }
  .btn-all:disabled  { opacity: 0.32; cursor: not-allowed; }
  .btn-stop { background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); display: none; flex: 0 0 auto; padding: 13px 18px; }

  .progress-area { display: none; margin-top: 14px; }
  .progress-area.visible { display: block; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 6px; height: 5px; overflow: hidden; margin-bottom: 7px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 6px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 0.8rem; color: var(--text-muted); }
  .progress-text strong { color: var(--green); }
</style>
</head>
<body>

<header>
  <h1>English Repeat Reader</h1>
  <p>문장을 체크해서 선택하고, 원하는 횟수만큼 반복해서 들어보세요</p>
</header>

<!-- STEP 1 -->
<div class="card">
  <div class="card-header" id="step1-header">
    <div class="card-label">STEP 1 — 영어 텍스트 입력</div>
    <button class="toggle-btn" id="toggle-btn">
      <span id="toggle-label">접기</span>
      <span class="toggle-arrow open" id="toggle-arrow">▲</span>
    </button>
  </div>
  <div id="input-summary"></div>

  <!-- 접히는 영역 -->
  <div class="collapsible expanded" id="collapsible-input">
    <textarea id="text-area" placeholder="영어 문장을 여기에 붙여넣으세요.

예) The Lord is my shepherd; I shall not want.
He makes me lie down in green pastures.
He leads me beside still waters.
He restores my soul."></textarea>
    <br>
    <button class="parse-btn" id="btn-parse">문장 분리하기</button>
    <p class="hint">마침표 / 물음표 / 느낌표 기준으로 자동 분리됩니다.</p>
  </div>
</div>

<!-- STEP 2 -->
<div class="card" id="card-sentences" style="display:none">
  <div class="card-label">STEP 2 — 듣고 싶은 문장 체크</div>
  <div class="select-toolbar">
    <button class="toolbar-btn select-all"   id="btn-select-all">전체 선택</button>
    <button class="toolbar-btn deselect-all" id="btn-deselect-all">전체 해제</button>
    <div class="selected-count"><span id="check-count">0</span>개 선택됨</div>
  </div>
  <div id="sentence-list"></div>
</div>

<!-- STEP 3 -->
<div class="card">
  <div class="card-label">STEP 3 — 선택 확인 &amp; 재생</div>
  <div id="selected-box">체크한 문장들이 여기에 표시됩니다.</div>
  <div class="controls-row">
    <div class="ctrl-group">
      <button class="round-btn" id="btn-minus">-</button>
      <span class="ctrl-label">반복</span>
      <div id="repeat-count">3</div>
      <span class="ctrl-label">회</span>
      <button class="round-btn" id="btn-plus">+</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">속도</span>
      <input type="range" id="speed-range" min="0.5" max="1.5" step="0.1" value="0.9">
      <div id="speed-val">0.9x</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-play" id="btn-play" disabled>▶ 체크 문장 반복</button>
    <button class="btn btn-all"  id="btn-all"  disabled>전체 읽기</button>
    <button class="btn btn-stop" id="btn-stop">■ 중지</button>
  </div>
  <div class="progress-area" id="progress-area">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</div>

<script>
  var textArea     = document.getElementById('text-area');
  var sentenceList = document.getElementById('sentence-list');
  var cardSent     = document.getElementById('card-sentences');
  var selectedBox  = document.getElementById('selected-box');
  var repeatEl     = document.getElementById('repeat-count');
  var checkCountEl = document.getElementById('check-count');
  var btnPlay      = document.getElementById('btn-play');
  var btnAll       = document.getElementById('btn-all');
  var btnStop      = document.getElementById('btn-stop');
  var progressArea = document.getElementById('progress-area');
  var progressBar  = document.getElementById('progress-bar');
  var progressText = document.getElementById('progress-text');
  var speedRange   = document.getElementById('speed-range');
  var speedVal     = document.getElementById('speed-val');

  var collapsible  = document.getElementById('collapsible-input');
  var toggleBtn    = document.getElementById('toggle-btn');
  var toggleLabel  = document.getElementById('toggle-label');
  var toggleArrow  = document.getElementById('toggle-arrow');
  var inputSummary = document.getElementById('input-summary');

  var sentences   = [];
  var checked     = [];
  var repeatCount = 3;
  var isPlaying   = false;
  var stopFlag    = false;
  var isExpanded  = true;

  // ── 접기/펼치기 ──
  document.getElementById('step1-header').addEventListener('click', function() {
    toggleInput();
  });

  function toggleInput() {
    isExpanded = !isExpanded;
    collapsible.classList.toggle('expanded', isExpanded);
    toggleLabel.textContent = isExpanded ? '접기' : '펼치기';
    toggleArrow.classList.toggle('open', isExpanded);
  }

  function collapseInput() {
    isExpanded = false;
    collapsible.classList.remove('expanded');
    toggleLabel.textContent = '펼치기';
    toggleArrow.classList.remove('open');
  }

  // ── 문장 분리 ──
  document.getElementById('btn-parse').addEventListener('click', function() {
    var raw = textArea.value.trim();
    if (!raw) return;
    var parts = raw.split(/(?<=[.!?])\s+|\n+/);
    sentences = parts.map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
    checked   = sentences.map(function(){ return false; });
    renderSentences();
    cardSent.style.display = '';
    btnAll.disabled = false;
    updatePreview();

    // 분리 후 자동으로 접기
    collapseInput();
    inputSummary.style.display = 'block';
    inputSummary.innerHTML = '총 <span>' + sentences.length + '개</span> 문장이 분리됐어요. 헤더를 눌러 수정할 수 있어요.';
  });

  // ── 렌더링 ──
  function renderSentences() {
    sentenceList.innerHTML = '';
    sentences.forEach(function(s, i) {
      var div = document.createElement('div');
      div.className = 'sentence-item';
      div.dataset.idx = i;

      var cb  = document.createElement('div'); cb.className = 'custom-cb';
      var num = document.createElement('span'); num.className = 'sentence-num'; num.textContent = (i+1);
      var txt = document.createElement('span'); txt.className = 'sentence-txt'; txt.textContent = s;

      div.appendChild(cb); div.appendChild(num); div.appendChild(txt);
      div.addEventListener('click', function() { if (!isPlaying) toggleCheck(i); });
      sentenceList.appendChild(div);
    });
    updateCheckCount();
  }

  function toggleCheck(idx) {
    checked[idx] = !checked[idx];
    var items = sentenceList.querySelectorAll('.sentence-item');
    items[idx].className = 'sentence-item' + (checked[idx] ? ' checked' : '');
    updateCheckCount();
    updatePreview();
  }

  function setAllChecked(val) {
    if (isPlaying) return;
    checked = checked.map(function(){ return val; });
    sentenceList.querySelectorAll('.sentence-item').forEach(function(el, i) {
      el.className = 'sentence-item' + (val ? ' checked' : '');
    });
    updateCheckCount(); updatePreview();
  }

  function updateCheckCount() {
    var cnt = checked.filter(Boolean).length;
    checkCountEl.textContent = cnt;
    btnPlay.disabled = (cnt === 0);
  }

  function updatePreview() {
    var picked = [];
    checked.forEach(function(v, i){ if (v) picked.push(i); });
    if (picked.length === 0) {
      selectedBox.innerHTML = '체크한 문장들이 여기에 표시됩니다.';
      selectedBox.className = ''; return;
    }
    selectedBox.className = 'has-text';
    selectedBox.innerHTML = picked.map(function(i){
      return '<div class="preview-item"><span class="preview-num">' + (i+1) + '</span>' + sentences[i] + '</div>';
    }).join('');
  }

  document.getElementById('btn-select-all').addEventListener('click',   function(){ setAllChecked(true);  });
  document.getElementById('btn-deselect-all').addEventListener('click', function(){ setAllChecked(false); });

  document.getElementById('btn-minus').addEventListener('click', function() {
    if (repeatCount > 1) { repeatCount--; repeatEl.textContent = repeatCount; }
  });
  document.getElementById('btn-plus').addEventListener('click', function() {
    if (repeatCount < 20) { repeatCount++; repeatEl.textContent = repeatCount; }
  });

  speedRange.addEventListener('input', function() {
    speedVal.textContent = parseFloat(speedRange.value).toFixed(1) + 'x';
  });

  // ── 체크 문장 반복 ──
  btnPlay.addEventListener('click', async function() {
    var picked = [];
    checked.forEach(function(v, i){ if (v) picked.push(i); });
    if (picked.length === 0 || isPlaying) return;
    startPlaying();
    for (var r = 1; r <= repeatCount; r++) {
      if (stopFlag) break;
      for (var j = 0; j < picked.length; j++) {
        if (stopFlag) break;
        var idx = picked[j];
        setPlayingItem(idx);
        var total = repeatCount * picked.length;
        var cur   = (r-1) * picked.length + j;
        progressBar.style.width = Math.round((cur/total)*100) + '%';
        progressText.innerHTML = '<strong>' + r + '번째 반복</strong> (' + picked.length + '문장 중 ' + (j+1) + '번째)';
        await speak(sentences[idx]);
        if (stopFlag) break;
        if (j < picked.length - 1) await delay(350);
      }
      if (!stopFlag && r < repeatCount) await delay(500);
    }
    if (!stopFlag) {
      progressBar.style.width = '100%';
      progressText.innerHTML = '✅ <strong>' + repeatCount + '번</strong> 반복 완료!';
    }
    finishPlaying();
  });

  // ── 전체 읽기 ──
  btnAll.addEventListener('click', async function() {
    if (sentences.length === 0 || isPlaying) return;
    startPlaying();
    for (var i = 0; i < sentences.length; i++) {
      if (stopFlag) break;
      setPlayingItem(i);
      progressBar.style.width = Math.round((i/sentences.length)*100) + '%';
      progressText.innerHTML = '<strong>' + (i+1) + '번째 문장</strong> / 총 ' + sentences.length + '문장';
      await speak(sentences[i]);
      if (stopFlag) break;
      await delay(350);
    }
    if (!stopFlag) {
      progressBar.style.width = '100%';
      progressText.innerHTML = '✅ 전체 <strong>' + sentences.length + '문장</strong> 완료!';
    }
    finishPlaying();
  });

  btnStop.addEventListener('click', function() {
    stopFlag = true; window.speechSynthesis.cancel();
  });

  function setPlayingItem(idx) {
    sentenceList.querySelectorAll('.sentence-item').forEach(function(el, i) {
      el.classList.remove('playing');
      if (i === idx) { el.classList.add('playing'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    });
  }

  function startPlaying() {
    isPlaying = true; stopFlag = false;
    btnPlay.disabled = true; btnAll.disabled = true;
    btnPlay.textContent = '재생 중...';
    btnStop.style.display = '';
    progressArea.classList.add('visible');
    progressBar.style.width = '0%';
  }

  function finishPlaying() {
    if (stopFlag) progressText.innerHTML = '⏹ 중지됐어요.';
    setPlayingItem(-1);
    sentenceList.querySelectorAll('.sentence-item').forEach(function(el, i) {
      el.className = 'sentence-item' + (checked[i] ? ' checked' : '');
    });
    isPlaying = false;
    btnPlay.disabled = (checked.filter(Boolean).length === 0);
    btnAll.disabled  = (sentences.length === 0);
    btnPlay.textContent = '▶ 체크 문장 반복';
    btnStop.style.display = 'none';
  }

  function speak(text) {
    return new Promise(function(resolve) {
      window.speechSynthesis.cancel();
      var utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US'; utter.rate = parseFloat(speedRange.value); utter.pitch = 1.0;
      var voices  = window.speechSynthesis.getVoices();
      var enVoice = voices.find(function(v){ return v.lang === 'en-US'; }) ||
                    voices.find(function(v){ return v.lang.startsWith('en'); });
      if (enVoice) utter.voice = enVoice;
      utter.onend = resolve; utter.onerror = resolve;
      window.speechSynthesis.speak(utter);
    });
  }

  function delay(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
</script>
